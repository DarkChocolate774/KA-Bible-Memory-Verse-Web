<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="style.css">
    <title>Scripture Memory</title>
</head>

<body data-theme="sepia">

    <main class="wrap">

        <header class="top">
            <h1>Scripture Memory</h1>
            <p class="sub">Pick a verse. Choose a game. Memorize step by step.</p>

            <br>

            <div class="topNav">
                <div class="tabs">
                    <button type="button" id="tabPractice" class="tab">Practice</button>
                    <button type="button" id="tabLibrary" class="tab">Library</button>
                    <button type="button" id="tabManage" class="tab">Manage</button>
                </div>

                <div class="authControls">
                    <span id="authMsg">Not signed in.</span>
                    <button type="button" id="btnLogin">Login with Google</button>
                    <button type="button" id="btnLogout" class="isHidden">Logout</button>
                </div>
            </div>
        </header>

        <!-- Practice Page -->
        <section id="pagePractice" class="page">
            <section class="card">
                <div class="row">
                    <label>Current Verse</label>
                    <div class="verseTitle" id="practiceVerseTitle"></div>
                </div>
                <div class="verseRef" id="practiceVerseRef"></div>
                <div class="verseText" id="verseText"></div>

                <div class="controls">
                    <button type="button" id="btnTypeMode">Type from Memory</button>
                    <button type="button" id="btnDragMode">Drag Words</button>
                    <button type="button" id="btnFirstLetterMode">First Letter</button>
                    <button type="button" id="btnShowLibraryManage">Manage Library</button>
                </div>
            </section>
        </section>

        <!-- Library Page -->
        <section id="pageLibrary" class="page isHidden">
            <section class="card">
                <h2>Library</h2>
                
                <div id="libraryFilters">
                    <div class="filterSection">
                        <label>Collection</label>
                        <div class="chipContainer" id="libraryCollectionFilters"></div>
                    </div>
                    
                    <div class="filterSection">
                        <label>Group</label>
                        <div class="chipContainer" id="libraryGroupFilters"></div>
                    </div>
                </div>

                <div id="libraryGrid"></div>

                <div class="controls">
                    <button type="button" id="btnAddVerse">Add New Verse</button>
                    <button type="button" id="btnImportCsvPage">Import CSV</button>
                </div>
            </section>
        </section>

        <!-- Manage Verse Page -->
        <section id="pageManage" class="page isHidden">
            <section class="card">
                <h2>Manage Verse</h2>
                
                <div class="row">
                    <label for="manageCollection">Collection</label>
                    <select id="manageCollection">
                        <option value="None">None</option>
                    </select>
                </div>

                <div class="row">
                    <label for="manageGroup">Group</label>
                    <input id="manageGroup" type="text" placeholder="Group name">
                </div>

                <div class="row">
                    <label for="manageTitle">Title</label>
                    <input id="manageTitle" type="text" placeholder="Verse title">
                </div>

                <div class="row">
                    <label for="manageRef">Reference</label>
                    <input id="manageRef" type="text" placeholder="Book Chapter:Verse">
                </div>

                <div class="row">
                    <label for="manageVersion">Version</label>
                    <input id="manageVersion" type="text" placeholder="Bible version">
                </div>

                <div class="row">
                    <label for="manageText">Text</label>
                    <textarea id="manageText" rows="4" placeholder="Verse text"></textarea>
                </div>

                <div class="controls">
                    <button type="button" id="btnSaveVerse">Save Verse</button>
                    <button type="button" id="btnDeleteVerse" class="danger">Delete Verse</button>
                </div>

                <div class="result" id="manageMsg"></div>
            </section>
        </section>

        <!-- Game Pages -->
        <section id="pageTyping" class="page isHidden">
            <section class="card">
                <h2 id="typingVerseTitle"></h2>
                <div class="verseRef" id="typingVerseRef"></div>
                <div class="prompt" id="typingPrompt"></div>
                <textarea id="typingInput" rows="4" placeholder="Type the verse here..."></textarea>
                <div class="stats" id="typingStats"></div>
                <div class="controls">
                    <button type="button" id="btnCheckTyping">Check</button>
                    <button type="button" id="btnRevealTyping">Reveal</button>
                    <button type="button" id="btnBackFromTyping">Back</button>
                </div>
                <div class="result" id="typingResult"></div>
            </section>
        </section>

        <section id="pageDrag" class="page isHidden">
            <section class="card">
                <h2 id="dragVerseTitle"></h2>
                <div class="verseRef" id="dragVerseRef"></div>
                <div class="hint" id="dragHint"></div>
                <div class="puzzleArea" id="dragPuzzleArea"></div>
                <div class="wordBank" id="dragBank"></div>
                <div class="controls">
                    <button type="button" id="btnCheckDrag">Check</button>
                    <button type="button" id="btnResetDrag">Reset</button>
                    <button type="button" id="btnBackFromDrag">Back</button>
                </div>
                <div class="result" id="dragResult"></div>
            </section>
        </section>

        <section id="pageFirstLetter" class="page isHidden">
            <section class="card">
                <h2 id="firstLetterVerseTitle"></h2>
                <div class="verseRef" id="firstLetterVerseRef"></div>
                <div class="prompt" id="firstLetterPrompt"></div>
                <textarea id="firstLetterInput" rows="4" placeholder="Type the verse here..."></textarea>
                <div class="stats" id="firstLetterStats"></div>
                <div class="controls">
                    <button type="button" id="btnCheckFirstLetter">Check</button>
                    <button type="button" id="btnRevealFirstLetter">Reveal</button>
                    <button type="button" id="btnBackFromFirstLetter">Back</button>
                </div>
                <div class="result" id="firstLetterResult"></div>
            </section>
        </section>

        <!-- Move Verse Page -->
        <section id="pageMoveVerse" class="page isHidden">
            <section class="card">
                <h2>Move Verse</h2>
                <div class="verseTitle" id="moveVerseTitle"></div>
                
                <div class="row">
                    <label for="moveCollectionSelect">Collection</label>
                    <select id="moveCollectionSelect"></select>
                </div>

                <div class="row">
                    <label for="moveGroupSelect">Group</label>
                    <select id="moveGroupSelect"></select>
                </div>

                <div class="row">
                    <label for="moveNewGroupInput">Or New Group</label>
                    <input id="moveNewGroupInput" type="text" placeholder="New group name">
                </div>

                <div class="controls">
                    <button type="button" id="btnSaveMoveVerse">Save</button>
                    <button type="button" id="btnBackFromMoveVerse">Cancel</button>
                </div>

                <div class="result" id="moveVerseMsg"></div>
            </section>
        </section>

        <!-- Import CSV Page -->
        <section id="pageImportCsv" class="page isHidden">
            <section class="card">
                <h2>Import CSV</h2>
                
                <div class="row">
                    <label for="csvFileInput">CSV File</label>
                    <input id="csvFileInput" type="file" accept=".csv">
                </div>

                <div class="row">
                    <label for="importCollectionSelect">Collection</label>
                    <select id="importCollectionSelect"></select>
                </div>

                <div class="row">
                    <label for="importGroupSelect">Group</label>
                    <select id="importGroupSelect"></select>
                </div>

                <div class="row">
                    <label for="importNewGroupInput">Or New Group</label>
                    <input id="importNewGroupInput" type="text" placeholder="New group name">
                </div>

                <div class="controls">
                    <button type="button" id="btnImportCsv">Import</button>
                    <button type="button" id="btnBackFromImportCsv">Cancel</button>
                </div>

                <div class="result" id="importCsvMsg"></div>
            </section>
        </section>

    </main>

    <script type="module" src="app.js"></script>

</body>

</html>
