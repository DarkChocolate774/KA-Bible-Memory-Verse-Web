<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Scripture Memory</title>
</head>

<body data-theme="sepia">

    <main class="wrap">

        <header class="top">
            <h1>Scripture Memory</h1>
            <p class="sub">Pick a verse. Choose a game. Memorize step by step.</p>

            <br>

            <div class="tabs">
                <button id="tabLibrary" class="tab">Library</button>
                <button id="tabSettings" class="tab">Settings</button>
            </div>
        </header>

        <br>

        <section id="pagePractice" class="isHidden">

            <section class="card">

                <div class="row">
                    <label>Verse</label>
                    <select id="verseSelect"></select>
                </div>

                <div class="ref" id="refText"></div>
                <div class="verse" id="verseText"></div>

                <div id="lettersGame" class="verse isHidden"></div>

                <div id="dragGame" class="isHidden">
                    <div class="verse" id="blankLine"></div>
                    <hr class="sep">
                    <div id="wordBank" class="controls"></div>
                </div>

                <div class="controls">
                    <button id="btnHideAll">Reveal All</button>
                </div>

                <hr class="sep">

                <div class="row" id="answerRow">
                    <label>Type from Memory</label>
                    <textarea id="answer" rows="4"></textarea>
                </div>

                <div class="controls">
                    <button id="btnReset">Reset</button>
                    <button id="btnGiveHint">Hint</button>
                    <button id="btnCheck">Check</button>
                </div>

                <div class="result" id="result"></div>
                <div class="stats" id="stats"></div>

                <div class="controls">
                    <button id="btnBackToGame">Back</button>
                </div>

            </section>
        </section>



        <section id="pageLibrary">

            <section class="card">

                <h2>Library</h2>

                <div class="row">
                    <label for="pasteBox">Paste from YouVersion</label>
                    <textarea id="pasteBox" rows="6"
                        placeholder="Paste copied verse text, reference, and link from YouVersion here">
                    </textarea>
                </div>

                <div class="controls">
                    <button id="btnAutoFill" type="button">Auto Fill</button>
                </div>

                <div class="row">
                    <label>Reference</label>
                    <input id="newRef">
                </div>

                <div class="row">
                    <label for="newVersion">Version</label>
                    <input id="newVersion" type="text" placeholder="Example: NLT">
                </div>

                <div class="row">
                    <label>Verse text</label>
                    <textarea id="newText" rows="4"></textarea>
                </div>

                <div class="controls">
                    <button id="btnSaveVerse">Save Verse</button>
                </div>

                <div class="result" id="ManageMsg"></div>

                <hr class="sep">

                <div id="libraryGrid"></div>

            </section>

        </section>

        <section id="pageGame" class="isHidden">

            <section class="card">

                <h2 id="gameTitle">Choose a game</h2>

                <div class="ref" id="gameRef"></div>
                <div class="verse" id="gameVerse"></div>

                <div class="controls">
                    <button id="modeType">Type from memory</button>
                    <button id="modeDrag">Drag and drop blanks</button>
                    <button id="modeLetters">First letter mode</button>
                </div>

                <hr class="sep">

                <div class="controls">
                    <button id="btnBackToLibrary">Back</button>
                </div>

            </section>

        </section>



        <section id="pageSettings" class="isHidden">

            <section class="card">

                <h2>Settings</h2>

                <div class="row">
                    <label>Color Theme</label>

                    <select id="themeSelect">

                        <option value="sepia" selected>Sepia Light</option>
                        <option value="white">Classic White</option>
                        <option value="warm">Warm Brown</option>
                        <option value="night">Night Blue</option>
                        <option value="forest">Forest Green</option>
                    </select>
                </div>

                <div class="result" id="settingsMsg">Theme saved in this browser.</div>
            </section>

        </section>



        <footer class="foot">
            Saved in your browser
        </footer>

    </main>

    <script src="app.js"></script>

</body>

</html>
