<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Scripture Memory</title>
</head>
<body>
    <main class="wrap">
        <header class="top">
            <h1>Scripture Memory</h1>
            <p class="sub">Pick a verse. Hide words. Type it out. </p>
        </header>

        <section class="card">
            <div class="row">
                <label for="verseSelect">Verse</label>
                <select id="verseSelect"></select>
            </div>

            <div class="ref" id="refText"></div>

            <div class="verse" id="verseText" aria-live="polite"></div>

            <div class="controls">
                <button id="btnManage" type="button">Manage Verses</button>
                <button id="btnRevealOne" type="button">Reveal 1 word</button>
                <button id="btnHideMore" type="button">Hide more</button>
                <button id="btnHideAll" type="button">Hide All</button>
                <button id="btnReset" type="button">Reset</button>
            </div>

            <hr class="sep" />

            <div class="row">
                <label for="answer">Type from Memory</label>
                <textarea id="answer" rows="4" placeholder="Hide words first to type." disabled></textarea>
            </div>

            <div class="controls"> <button id="btnCheck" type="button">Check</button> <button id="btnGiveHint" type="button">Hint</button> </div>

            <div class="result" id="result"></div>
            <div class="stats" id="stats"></div>

            <div id="managePanel" class="panel isHidden">
                <div class="row">
                    <label for="newRef">Reference</label>
                    <input id="newRef" type="text" placeholder="Example: Romans 8:28">
                </div>

                <div class="row">
                    <label for="newText">Verse text</label>
                    <textarea id="newText" rows="4" placeholder="paste the verse text here."></textarea>
                </div>

                <div class="controls">
                    <button id="btnSaveVerse" type="button">Save Verse</button>
                    <button id="btnCloseManage" type="button">Close</button>
                </div>

                <div class="result" id="ManageMsg"></div>

                <hr class="sep" />

                <div class="row">
                    <label>Your saved verses</label>
                    <div id="customList"></div>
                </div>
            </div>
        </section>

        <footer class="foot">
            <small>Saved in your browser. No LogIn.</small>
        </footer>
    </main>

    <script src="app.js"></script>

</body>
</html>
